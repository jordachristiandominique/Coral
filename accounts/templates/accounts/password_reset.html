{% extends 'base.html' %}

{% block title %}Reset Password - CoralSense{% endblock %}

{% block content %}
<div class="container">
    <div class="row col-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4"><strong>Reset Password</strong></h2>

                    <p class="text-muted text-center mb-4">
                        Enter your email address and we'll send you instructions to reset your password.
                    </p>

                    <form method="POST" novalidate class="prevent-double-submit">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="id_email"><strong>Email Address</strong></label>
                            <input type="email" class="form-control" id="id_email" name="email" required
                                placeholder="Email Address">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1.5rem;">
                            <strong>Send Reset Link</strong>
                        </button>
                    </form>

                    <hr>

                    <p class="text-center">
                        Remember your password?
                        <a href="{% url 'login' %}"><strong>Login here</strong></a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
