{% extends 'base.html' %}

{% block title %}Reset Password Confirmation - CoralSense{% endblock %}

{% block content %}
<div class="container">
    <div class="row col-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4"><strong>Enter New Password</strong></h2>

                    <form method="POST" novalidate class="prevent-double-submit">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="id_new_password1"><strong>New Password</strong></label>
                            <input type="password" class="form-control" id="id_new_password1" name="new_password1"
                                required placeholder="New Password">
                        </div>

                        <div class="form-group">
                            <label for="id_new_password2"><strong>Confirm New Password</strong></label>
                            <input type="password" class="form-control" id="id_new_password2" name="new_password2"
                                required placeholder="Confirm New Password">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1.5rem;">
                            <strong>Reset Password</strong>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
